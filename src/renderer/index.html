<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" />
  <title>Quillpad</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-head">
        <div class="brand"><span class="brand-quill">🪶</span> Quillpad</div>
        <div class="sidebar-actions">
          <button id="btn-new-note" title="New note (Ctrl+N)">＋</button>
          <button id="btn-new-folder" title="New folder">📁</button>
          <button id="btn-vault" title="Choose vault folder">🗂</button>
        </div>
      </div>

      <div class="search-wrap">
        <input id="search-input" type="text" placeholder="Search all notes…  (Ctrl+Shift+F)" spellcheck="false" />
      </div>

      <div id="search-results" class="hidden"></div>

      <div id="tree-wrap">
        <div id="tree" class="drop-root"></div>
      </div>

      <div id="tags-section">
        <div class="section-title">TAGS</div>
        <div id="tag-list"></div>
      </div>

      <div class="sidebar-foot">
        <button id="btn-explorer" title="Open vault in Explorer">Open folder</button>
        <span id="vault-path" title=""></span>
      </div>
    </aside>

    <main id="main">
      <div id="topbar">
        <div id="note-title">No note open</div>
        <div class="topbar-actions">
          <button id="btn-daily" title="Daily note (Ctrl+D)">📅 Daily</button>
          <button id="btn-preview" title="Toggle preview (Ctrl+E)">👁 Preview</button>
          <button id="btn-backlinks" title="Toggle backlinks panel">🔗 Links</button>
        </div>
      </div>
      <div id="editor-area">
        <div id="editor-host"></div>
        <div id="preview" class="hidden markdown-body"></div>
        <div id="empty-state">
          <div class="empty-quill">🪶</div>
          <p>Select a note, or press <kbd>Ctrl+N</kbd> to create one.</p>
          <p class="dim"><kbd>Ctrl+P</kbd> quick switcher · <kbd>Ctrl+D</kbd> daily note · <kbd>Ctrl+Shift+N</kbd> quick capture</p>
        </div>
      </div>
    </main>

    <aside id="backlinks-panel">
      <div class="section-title">BACKLINKS</div>
      <div id="backlinks-list"><p class="dim pad">Nothing links here yet.</p></div>
    </aside>
  </div>

  <!-- Quick switcher -->
  <div id="switcher" class="modal hidden">
    <div class="modal-box">
      <input id="switcher-input" type="text" placeholder="Jump to note…" spellcheck="false" autocomplete="off" />
      <div id="switcher-list"></div>
    </div>
  </div>

  <!-- Context menu -->
  <div id="ctx-menu" class="hidden"></div>

  <!-- Inline prompt -->
  <div id="prompt" class="modal hidden">
    <div class="modal-box small">
      <div id="prompt-label"></div>
      <input id="prompt-input" type="text" spellcheck="false" autocomplete="off" />
      <div class="prompt-buttons">
        <button id="prompt-cancel">Cancel</button>
        <button id="prompt-ok" class="primary">OK</button>
      </div>
    </div>
  </div>

  <script src="dist/bundle.js"></script>
</body>
</html>
